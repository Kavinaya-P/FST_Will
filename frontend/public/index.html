<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="description" content="Estate Vault — Secure Digital Legacy Platform" />
    <title>Estate Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Variables ───────────────────────── */
      :root {
        --bg:      #0a0a0b;
        --card:    #0f0f14;
        --surface: #13131a;
        --border:  #1e1e28;
        --border2: #2a2a38;
        --text:    #c8c8d8;
        --bright:  #eeeef8;
        --muted:   #5a5a72;
        --gold:    #c9a84c;
        --green:   #4caf7d;
        --red:     #c45555;
      }

      /* ── Reset & Base ────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Scrollbar ───────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

      /* ── Spin animation ──────────────────────── */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* ── Selection ───────────────────────────── */
      ::selection { background: rgba(201, 168, 76, 0.2); color: var(--bright); }

      /* ── Input autofill dark override ────────── */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 1000px var(--surface) inset !important;
        -webkit-text-fill-color: var(--bright) !important;
        caret-color: var(--bright);
      }

      /* ── Links default ───────────────────────── */
      a { color: var(--gold); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Estate Vault.</noscript>
    <div id="root"></div>
  </body>
</html>
